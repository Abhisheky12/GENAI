<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Mode Coding Instructor AI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Added Marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* === Your styles kept === */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    :root {
      --primary: #7e6fff; --primary-dark: #6a5af9; --secondary: #00d4ff;
      --dark-bg: #121826; --dark-card: #1e293b; --dark-border: #2d3749;
      --text-primary: #e2e8f0; --text-secondary: #94a3b8;
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --code-bg: #0f172a; --sidebar-width: 280px; --transition: all 0.3s ease;
    }
    body { background-color: var(--dark-bg); color: var(--text-primary); display: flex; min-height: 100vh; overflow-x: hidden; }
    .sidebar { width: var(--sidebar-width); background-color: #0c1120; height: 100vh; position: fixed; left: 0; top: 0; padding: 25px 0; border-right: 1px solid var(--dark-border); display: flex; flex-direction: column; z-index: 100; }
    .logo { display: flex; align-items: center; gap: 15px; padding: 0 25px 30px; border-bottom: 1px solid var(--dark-border); margin-bottom: 30px; }
    .logo-icon { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .logo-text { font-size: 1.4rem; font-weight: 700; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sidebar-menu { padding: 0 15px; flex-grow: 1; }
    .menu-item { display: flex; align-items: center; gap: 15px; padding: 14px 20px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: var(--transition); color: var(--text-secondary); }
    .menu-item:hover, .menu-item.active { background: rgba(126, 111, 255, 0.1); color: var(--primary); }
    .menu-item i { width: 24px; text-align: center; }
    .sidebar-footer { padding: 20px 25px 0; border-top: 1px solid var(--dark-border); color: var(--text-secondary); font-size: 0.85rem; }
    .main-content { flex: 1; margin-left: var(--sidebar-width); padding: 30px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .header h1 { font-size: 2.2rem; font-weight: 700; background: linear-gradient(to right, var(--text-primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 30px; }
    .card { background: var(--dark-card); border-radius: 16px; border: 1px solid var(--dark-border); overflow: hidden; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); }
    .card-header { padding: 20px 25px; border-bottom: 1px solid var(--dark-border); display: flex; justify-content: space-between; align-items: center; }
    .card-header h2 { font-size: 1.3rem; font-weight: 600; display: flex; align-items: center; gap: 12px; }
    .card-body { padding: 25px; }
    .input-section { grid-column: span 2; }
    textarea#questionInput { width: 100%; padding: 18px; border: 1px solid var(--dark-border); border-radius: 12px; font-size: 16px; min-height: 150px; resize: vertical; background: rgba(30, 41, 59, 0.5); color: var(--text-primary); font-family: 'Segoe UI', monospace; }
    button#askButton { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 18px 25px; border: none; border-radius: 12px; cursor: pointer; font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; }
    button#askButton:disabled { background: #64748b; cursor: not-allowed; }
    .output-section { grid-column: span 2; }
    #outputArea { padding: 30px; min-height: 250px; line-height: 1.7; font-size: 16px; max-height: 400px; overflow-y: auto; }
    .loading-indicator { text-align: center; padding: 30px; display: none; }
    .spinner { width: 50px; height: 50px; border: 5px solid rgba(126, 111, 255, 0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-message { color: var(--danger); background: rgba(239, 68, 68, 0.1); padding: 20px; border-radius: 12px; margin: 15px 0; border-left: 4px solid var(--danger); }
    
    /* Added styles for code blocks */
    #outputArea pre {
        background-color: var(--code-bg);
        padding: 15px;
        border-radius: 8px;
        border: 1px solid var(--dark-border);
        overflow-x: auto;
        margin: 10px 0;
        color: var(--text-primary);
    }
    #outputArea code {
        font-family: 'Courier New', Courier, monospace;
        background-color: rgba(126, 111, 255, 0.1);
        padding: 2px 5px;
        border-radius: 4px;
    }
    #outputArea pre code {
        background-color: transparent;
        padding: 0;
    }
    #outputArea p {
        margin-bottom: 0.5em;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <div class="logo-icon"><i class="fas fa-robot"></i></div>
      <div class="logo-text">Code Mentor AI</div>
    </div>
    <div class="sidebar-menu">
      <div class="menu-item active"><i class="fas fa-home"></i><span class="menu-text">Dashboard</span></div>
      <div class="menu-item"><i class="fas fa-history"></i><span class="menu-text">History</span></div>
    </div>
    <div class="sidebar-footer"><p>Code Mentor AI v2.0</p><p>Powered by Gemini API</p></div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="header"><h1>Coding Instructor AI</h1></div>
    <div class="dashboard">
      <!-- Input -->
      <div class="card input-section">
        <div class="card-header"><h2><i class="fas fa-question-circle" style="color: var(--secondary);"></i> Ask a Coding Question</h2></div>
        <div class="card-body">
          <textarea id="questionInput" placeholder="Type your coding question..."></textarea>
          <button id="askButton"><i class="fas fa-paper-plane"></i> Ask Coding Instructor</button>
        </div>
      </div>

      <!-- Output -->
      <div class="card output-section">
        <div class="card-header"><h2><i class="fas fa-graduation-cap" style="color: var(--success);"></i> Instructor's Response</h2></div>
        <div class="card-body">
          <div class="loading-indicator" id="loadingIndicator">
            <div class="spinner"></div>
            <p>Analyzing your question...</p>
          </div>
          <div class="output-container"><div id="outputArea"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // NOTE: The API key is intentionally left blank.
    // The execution environment will securely provide it.
    const GEMINI_API_KEY = "AIzaSyDwOmiqU_2327r8ArmlK4N0HFT_xKh5nwE";
    const MODEL_NAME = "gemini-1.5-flash-preview-0527";
    const systemInstructionText = "You are a Coding Instructor. Answer only coding-related questions. Format your answers using Markdown.";

    const questionInput = document.getElementById("questionInput");
    const askButton = document.getElementById("askButton");
    const outputArea = document.getElementById("outputArea");
    const loadingIndicator = document.getElementById("loadingIndicator");

    // Chat history
    let chatHistory = [];

    /**
     * Function to display messages.
     * This is the main change: it now uses marked.parse() for AI responses.
     */
    function addMessage(role, text) {
        const messageContainer = document.createElement('div');
        messageContainer.style.marginBottom = '20px';

        const roleElement = document.createElement('strong');
        roleElement.style.display = 'block';
        roleElement.style.marginBottom = '5px';
        roleElement.style.color = role === 'user' ? 'var(--secondary)' : 'var(--success)';
        roleElement.textContent = role === 'user' ? 'You:' : 'AI Instructor:';
        messageContainer.appendChild(roleElement);

        const contentElement = document.createElement('div');
        if (role === 'user') {
            // Display user's text as plain text
            contentElement.textContent = text;
        } else {
            // Parse the AI's Markdown response into HTML
            contentElement.innerHTML = marked.parse(text);
        }
        messageContainer.appendChild(contentElement);

        outputArea.appendChild(messageContainer);
        outputArea.scrollTop = outputArea.scrollHeight;
    }

    askButton.addEventListener("click", async () => {
      const question = questionInput.value.trim();
      if (!question) return;

      addMessage("user", question);
      chatHistory.push({ role: "user", parts: [{ text: question }] });

      outputArea.style.display = 'none';
      loadingIndicator.style.display = "block";
      askButton.disabled = true;

      const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${GEMINI_API_KEY}`;
      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: chatHistory,
            systemInstruction: { parts: [{ text: systemInstructionText }] }
          })
        });

        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error.message || `HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        
        const answer = data.candidates?.[0]?.content?.parts?.[0]?.text || "I'm sorry, I couldn't generate a response.";
        addMessage("model", answer);
        chatHistory.push({ role: "model", parts: [{ text: answer }] });
      } catch (err) {
        console.error(err);
        addMessage("model", `⚠️ **Error:** ${err.message}`);
      } finally {
        loadingIndicator.style.display = "none";
        outputArea.style.display = 'block';
        askButton.disabled = false;
        questionInput.value = "";
        questionInput.focus();
      }
    });
  </script>
</body>
</html>
